{%extends "base/form.html"%}
{%block post_form%}
{%if notices%}
<h2>审核通知</h2>
<p>
  此{{formitemtype}}之前收到了以下审核通知：
</p>
<table>
  <tr>
    <th>日期</th>
    <th>备注</th>
  </tr>
{%for n in notices%}
  <tr valign="top">
    <td>{{n.date}}</td>
    <td class="ws-pre">{{n.text}}</td>
  </tr>
{%endfor%}
</table>
{%endif%}

{%endblock%}
