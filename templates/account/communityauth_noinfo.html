<h1>社区认证</h1>
<p>
您尝试登录的网站（{{sitename}}）使用的是 postgresql.org 社区登录系统。
在该系统中，您需要创建一个社区账户，用于登录大多数 postgresql.org 服务。
一旦登录该账户，您将自动登录到关联的 postgresql.org 服务。
</p>
<p>
您的账户尚未填写社区认证所需的全部字段。必填字段包括：
<ul>
 <li>名字</li>
 <li>姓氏</li>
 <li>邮箱地址</li>
</ul>

请前往您的<a href="/account/profile/">账户资料</a>页面补充完善这些字段，然后重试。
</p>
{%endblock%}
