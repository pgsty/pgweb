{%extends "base/page.html"%}
{%block title%}检测到跨站请求{%endblock%}
{%block contents%}
<h1>检测到跨站请求</h1>
<p>
您访问此资源的请求失败，因为系统检测到跨站请求。这可能是一次正常的数据提交被系统识别为跨站请求，也可能是您的系统未配置为允许验证该请求。
</p>
<p>
此错误最常见的原因是您的浏览器在此请求中<strong>不允许 Cookie</strong>。跨站保护功能需要 Cookie 才能正常工作。
</p>
<p>
内部原因：<em>{{reason}}</em>
</p>
{%endblock%}
