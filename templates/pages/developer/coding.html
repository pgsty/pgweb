{%block title%}编码{%endblock%}

<h1>编码 <i class="fa fa-code"></i></h1>

<p>以下链接在浏览 PostgreSQL 源代码时非常有用。</p>

<h2>代码访问与信息</h2>
<ul>
    <li><a href="https://git.postgresql.org/gitweb?p=postgresql.git">源代码仓库的 Web 界面</a></li>
    <li><a href="/docs/current/git.html">关于源代码仓库的信息</a></li>
    <li><a href="https://doxygen.postgresql.org/">源代码浏览器</a>（Doxygen）</li>
    <li><a href="/developer/backend/">后端流程图</a></li>
    <li><a href="https://babel.postgresql.org/">翻译</a></li>
    <li><a href="https://wiki.postgresql.org/wiki/Developer_and_Contributor_Resources">wiki.postgresql.org 上的开发者专区</a></li>
</ul>

<h2>通过 Git Commit Hash 搜索代码</h2>
<div class="row">
  <div class="col-6">
  <form action="https://git.postgresql.org/gitweb" method="get">
    <input type="hidden" name="p" value="postgresql.git" />
    <input type="hidden" name="a" value="commitdiff" />
    <div class="input-group">
      <input class="form-control" type="text" name="h" type="text" size="40" placeholder="e.g. &quot;861861edcc04a6e3ebdfe363311f122e2b226196&quot;">
      <span class="input-group-btn">
        <button class="btn btn-default" type="submit"><i class="fas fa-search"></i></button>
      </span>
    </div><!-- /input-group -->
  </form>
</div>
</div>
<h2>文档</h2>
